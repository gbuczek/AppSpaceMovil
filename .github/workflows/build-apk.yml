name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Habilitar caché de Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
      
    - name: Licencias de Android SDK
      run: |
        mkdir -p $ANDROID_HOME/licenses
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-preview-license
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
        
    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools;platforms;android-34;build-tools;34.0.0'
        
    - name: Mostrar versión de Gradle y Android
      run: |
        gradle --version
        echo "ANDROID_HOME=$ANDROID_HOME"
        ls -la $ANDROID_HOME
        
    - name: Construir APK Debug
      run: gradle assembleDebug --stacktrace --info
      env:
        ANDROID_HOME: /usr/local/lib/android/sdk
        
    - name: Subir APK como artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
